# GEO-SEO: nginx bot routing snippet
# Include this in your server block: include /etc/nginx/snippets/ai-bot-routing.conf;

# Bot detection via user-agent
map $http_user_agent $is_bot {
    default 0;
    # AI crawlers
    ~*GPTBot 1;
    ~*ChatGPT-User 1;
    ~*ClaudeBot 1;
    ~*Claude-Web 1;
    ~*PerplexityBot 1;
    ~*anthropic-ai 1;
    ~*cohere-ai 1;
    # Search engines
    ~*Googlebot 1;
    ~*Google-Extended 1;
    ~*bingbot 1;
    ~*Baiduspider 1;
    ~*YandexBot 1;
    ~*DuckDuckBot 1;
    # Generic crawlers
    ~*curl 1;
    ~*wget 1;
    ~*python-requests 1;
    ~*Scrapy 1;
    ~*node-fetch 1;
}

